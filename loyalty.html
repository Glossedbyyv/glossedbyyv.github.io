<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glossed Loyalty Stamps</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffe6f0;
        text-align: center;
        padding: 20px;
        color: #d14b7a;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    .stamp-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        max-width: 350px;
        margin: 20px auto;
    }

    .stamp {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid #d14b7a;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 40px;
        color: #ff4f8b;
        transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .stamped {
        background-color: #ffd1e1;
        transform: scale(1.15);
    }

    #pinBox {
        margin-top: 25px;
    }

    input {
        padding: 10px;
        font-size: 18px;
        border: 2px solid #d14b7a;
        border-radius: 8px;
        outline: none;
    }

    button {
        margin-left: 10px;
        padding: 10px 18px;
        background-color: #d14b7a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    #resetBtn {
        margin-top: 20px;
        background-color: #999;
    }
</style>
</head>

<body>

<h1>Glossed by YVÉ Loyalty Stamps</h1>
<p>Enter your PIN to add a stamp.</p>

<div class="stamp-container">
    <div class="stamp" id="s1"></div>
    <div class="stamp" id="s2"></div>
    <div class="stamp" id="s3"></div>
    <div class="stamp" id="s4"></div>
    <div class="stamp" id="s5"></div>
    <div class="stamp" id="s6"></div>
</div>

<div id="pinBox">
    <input type="password" id="pinInput" placeholder="Enter PIN">
    <button onclick="addStamp()">Unlock</button>
</div>

<button id="resetBtn" onclick="resetStamps()">Reset Stamps</button>

<script>
    let stamps = JSON.parse(localStorage.getItem("stamps")) || 0;

    function renderStamps() {
        for (let i = 1; i <= stamps; i++) {
            document.getElementById("s" + i).classList.add("stamped");
            document.getElementById("s" + i).innerHTML = "❤️";
        }
    }

    function addStamp() {
        let pin = document.getElementById("pinInput").value;

        if (pin !== "0000") {
            alert("Incorrect PIN");
            return;
        }

        if (stamps >= 6) {
            alert("All stamps completed!");
            return;
        }

        stamps++;
        localStorage.setItem("stamps", stamps);
        renderStamps();
        document.getElementById("pinInput").value = "";
    }

    function resetStamps() {
        if (confirm("Reset all stamps?")) {
            stamps = 0;
            localStorage.setItem("stamps", stamps);
            location.reload();
        }
    }

    renderStamps();
</script>

</body>
</html>
