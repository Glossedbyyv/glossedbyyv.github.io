<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glossed Loyalty Card</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #ffd6e8;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 360px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ff9ecb;
    }

    button {
        width: 95%;
        padding: 12px;
        background: #ff7fbf;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    #card {
        width: 100%;
        height: 220px;
        background-image: url('loyaltycard.png');
        background-size: cover;
        background-position: center;
        position: relative;
        margin-top: 15px;
        border-radius: 12px;
    }

    .stamp {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        position: absolute;
        background: rgba(255,255,255,0.0);
        cursor: pointer;
    }

    /* Stamp positions */
    #s1 { top: 75px; left: 35px; }
    #s2 { top: 75px; left: 150px; }
    #s3 { top: 75px; left: 265px; }
    #s4 { top: 145px; left: 35px; }
    #s5 { top: 145px; left: 150px; }
    #s6 { top: 145px; left: 265px; }

    /* Reward text overlays */
    .reward-text {
        position: absolute;
        width: 55px;
        text-align: center;
        font-size: 12px;
        font-weight: bold;
        color: white;
        text-shadow: 0 0 4px rgba(0,0,0,0.6);
        pointer-events: none;
    }

    #r3 { top: 95px; left: 265px; }
    #r6 { top: 165px; left: 265px; }

    /* Heart animation */
    .heart {
        position: absolute;
        font-size: 20px;
        color: #ff4f9a;
        animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-40px); }
    }
</style>
</head>
<body>

<div class="container" id="authBox">
    <h2>Glossed Loyalty Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
</div>

<div class="container" id="cardBox" style="display:none;">
    <h2>Your Loyalty Card</h2>

    <div id="card">
        <div class="stamp" id="s1" onclick="attemptStamp(1)"></div>
        <div class="stamp" id="s2" onclick="attemptStamp(2)"></div>
        <div class="stamp" id="s3" onclick="attemptStamp(3)"></div>
        <div class="stamp" id="s4" onclick="attemptStamp(4)"></div>
        <div class="stamp" id="s5" onclick="attemptStamp(5)"></div>
        <div class="stamp" id="s6" onclick="attemptStamp(6)"></div>

        <div class="reward-text" id="r3">20% OFF</div>
        <div class="reward-text" id="r6">40% OFF</div>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script>
let currentUser = null;
const OWNER_PIN = "3923";

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

function getUsers() {
    return JSON.parse(localStorage.getItem("users") || "{}");
}

function signup() {
    let email = email.value;
    let pass = password.value;
    let users = getUsers();

    if (users[email]) {
        alert("Account already exists");
        return;
    }

    users[email] = { password: pass, stamps: [] };
    saveUsers(users);
    alert("Account created");
}

function login() {
    let emailVal = email.value;
    let passVal = password.value;
    let users = getUsers();

    if (!users[emailVal] || users[emailVal].password !== passVal) {
        alert("Invalid login");
        return;
    }

    currentUser = emailVal;
    authBox.style.display = "none";
    cardBox.style.display = "block";
    loadStamps();
}

function logout() {
    currentUser = null;
    authBox.style.display = "block";
    cardBox.style.display = "none";
}

function loadStamps() {
    let users = getUsers();
    let stamps = users[currentUser].stamps;

    stamps.forEach(num => {
        let spot = document.getElementById("s" + num);
        spot.style.background = "rgba(255,0,128,0.5)";
    });
}

function attemptStamp(num) {
    let pin = prompt("Enter owner PIN");

    if (pin !== OWNER_PIN) {
        alert("Incorrect PIN");
        return;
    }

    addStamp(num);
}

function addStamp(num) {
    let users = getUsers();
    let stamps = users[currentUser].stamps;

    if (!stamps.includes(num)) {
        stamps.push(num);
        saveUsers(users);

        let spot = document.getElementById("s" + num);
        spot.style.background = "rgba(255,0,128,0.5)";

        spawnHeart(spot);
    }
}

function spawnHeart(spot) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    let rect = spot.getBoundingClientRect();
    heart.style.left = rect.left + "px";
    heart.style.top = rect.top + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 1000);
}
</script>

</body>
</html>
